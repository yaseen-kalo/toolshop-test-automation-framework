name: Test Automation Pipeline


on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master



jobs:


  # =====================================================
  # API AUTOMATION TESTS
  # =====================================================

  api-tests:

    name: API Automation Tests

    runs-on: ubuntu-latest


    steps:


      # -------------------------
      # Checkout repository
      # -------------------------

      - name: Checkout code
        uses: actions/checkout@v4



      # -------------------------
      # Setup Node.js
      # -------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm



      # -------------------------
      # Create environment file
      # -------------------------

      - name: Create environment file
        run: |
          echo "UI_BASE_URL=${{ secrets.UI_BASE_URL }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env

          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env

          echo "CUSTOMER_EMAIL=${{ secrets.CUSTOMER_EMAIL }}" >> .env
          echo "CUSTOMER_PASSWORD=${{ secrets.CUSTOMER_PASSWORD }}" >> .env

          echo "DUPLICATEDEMAIL=${{ secrets.DUPLICATEDEMAIL }}" >> .env



      # -------------------------
      # Start MariaDB
      # -------------------------

      - name: Start database container
        run: |
          docker compose up -d mariadb



      # -------------------------
      # Wait for MariaDB
      # -------------------------

      - name: Wait for database
        run: |
          for i in {1..20}
          do
            if docker compose exec -T mariadb mysqladmin ping -h localhost --silent
            then
              echo "MariaDB is ready"
              exit 0
            fi

            echo "Waiting for MariaDB..."
            sleep 5
          done


          echo "MariaDB failed to start"
          docker compose logs mariadb
          exit 1



      # -------------------------
      # Start Laravel API
      # -------------------------

      - name: Start Laravel API container
        run: |
          docker compose up -d laravel-api



      # -------------------------
      # Wait for Laravel
      # -------------------------

      - name: Wait for Laravel API
        run: |
          for i in {1..20}
          do
            if docker compose exec -T laravel-api php artisan --version
            then
              echo "Laravel API is ready"
              exit 0
            fi


            echo "Waiting for Laravel API..."
            sleep 5
          done


          echo "Laravel API failed to start"
          docker compose logs laravel-api
          exit 1



      # -------------------------
      # Reset Database
      # -------------------------

      - name: Reset and seed database
        run: |
          docker compose exec -T laravel-api php artisan migrate:fresh --seed



      # -------------------------
      # Install Node dependencies
      # -------------------------

      - name: Install dependencies
        run: |
          npm ci



      # -------------------------
      # Install Playwright
      # -------------------------

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps



      # -------------------------
      # Run API Tests
      # -------------------------

      - name: Run API automation tests
        run: |
          npx playwright test tests/api



      # -------------------------
      # Upload Test Report
      # -------------------------

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/
          if-no-files-found: ignore



      # -------------------------
      # Docker Logs
      # -------------------------

      - name: Docker logs on failure
        if: failure()
        run: |
          docker compose logs



      # -------------------------
      # Cleanup
      # -------------------------

      - name: Cleanup containers
        if: always()
        run: |
          docker compose down -v





  # =====================================================
  # UI AUTOMATION TESTS (FUTURE)
  # =====================================================

  ui-tests:

    name: UI Automation Tests

    needs: api-tests

    runs-on: ubuntu-latest

    if: ${{ false }}


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20



      # Future:
      # docker compose up -d angular-ui
      # install UI dependencies
      # execute UI automation tests





  # =====================================================
  # END TO END TESTS (FUTURE)
  # =====================================================

  e2e-tests:

    name: End To End Tests

    needs:
      - api-tests
      - ui-tests

    runs-on: ubuntu-latest

    if: ${{ false }}


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20



      # Future:
      # docker compose up -d
      # start full application stack
      # execute Playwright E2E tests