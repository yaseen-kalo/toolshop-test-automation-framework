name: Test Automation Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  # =====================================================
  # API AUTOMATION TESTS
  # =====================================================

  api-tests:

    name: API Automation Tests

    runs-on: ubuntu-latest


    steps:

      # -------------------------
      # Checkout repository
      # -------------------------

      - name: Checkout code
        uses: actions/checkout@v4


      # -------------------------
      # Setup Node
      # -------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      # -------------------------
      # Create environment file
      # -------------------------

      - name: Create environment file
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env


      # -------------------------
      # Start backend services
      # -------------------------

      - name: Start backend containers
        run: |
          docker compose up -d mariadb laravel-api


      # -------------------------
      # Wait for Laravel API
      # -------------------------

      - name: Wait for backend service
        run: |
          for i in {1..12}
          do
            if docker compose exec -T laravel-api php artisan --version
            then
              echo "Laravel API is ready"
              exit 0
            fi

            echo "Waiting for Laravel..."
            sleep 10
          done

          echo "Laravel failed to start"
          docker compose logs laravel-api
          exit 1


      # -------------------------
      # Database reset
      # -------------------------

      - name: Reset and seed database
        run: |
          docker compose exec -T laravel-api php artisan migrate:fresh --seed


      # -------------------------
      # Install Playwright dependencies
      # -------------------------

      - name: Install dependencies
        run: |
          npm ci


      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps


      # -------------------------
      # Execute API tests
      # -------------------------

      - name: Run API tests
        run: |
          npx playwright test tests/api


      # -------------------------
      # Upload report
      # -------------------------

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/


      # -------------------------
      # Debug logs + cleanup
      # -------------------------

      - name: Docker logs
        if: failure()
        run: |
          docker compose logs


      - name: Cleanup containers
        if: always()
        run: |
          docker compose down -v



  # =====================================================
  # UI AUTOMATION TESTS (FUTURE)
  # =====================================================

  ui-tests:

    name: UI Automation Tests

    needs: api-tests

    runs-on: ubuntu-latest

    if: false


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      # Future:
      # - Start angular-ui container
      # - Install UI test dependencies
      # - Run UI automation tests



  # =====================================================
  # END TO END TESTS (FUTURE)
  # =====================================================

  e2e-tests:

    name: End To End Tests

    needs:
      - api-tests
      - ui-tests

    runs-on: ubuntu-latest

    if: false


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      # Future:
      # docker compose up -d
      # run complete application stack
      # execute Playwright e2e tests